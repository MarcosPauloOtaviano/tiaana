<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salgados da Tia Ana – Sabor de Casa</title>
    
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #e63946;
            --text: #4a4a4a;
            --success: #25D366;
            --mp-color: #009ee3;
            --bg: #fdfbf7;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 100px;
        }

        /* --- LAYOUT --- */
        .header-container {
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            overflow: hidden;
            margin-bottom: 30px;
            position: relative;
        }

        .header-banner {
            width: 100%;
            height: 200px;
            background-color: #eee;
            background-image: url('fundo.jpg'); 
            background-size: cover;
            background-position: center;
        }

        .header-content {
            padding: 0 20px 40px 20px;
            text-align: center;
            position: relative;
            background: white;
            margin-top: -20px; 
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
        }

        .avatar-vovo {
            width: 110px; height: 110px;
            background-color: white;
            border-radius: 50%;
            margin: -60px auto 15px;
            border: 5px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center;
            font-size: 55px;
            position: relative;
            z-index: 10;
        }

        .welcome-title {
            font-family: 'Caveat', cursive;
            font-size: 42px;
            color: #d35400;
            margin: 0;
            line-height: 1.1;
        }

        .welcome-text {
            font-size: 16px;
            line-height: 1.6;
            max-width: 600px;
            margin: 15px auto;
            color: #5d4037;
        }

        .btn-descer {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-family: 'Quicksand', sans-serif;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(230, 57, 70, 0.3);
            margin-top: 10px;
            transition: transform 0.2s;
        }
        .btn-descer:hover { transform: scale(1.05); }

        .container {
            max-width: 800px; margin: 0 auto; padding: 0 15px;
            position: relative; z-index: 10;
        }

        .section-title {
            text-align: center; font-family: 'Caveat', cursive;
            color: var(--primary); font-size: 32px; margin-top: 20px; margin-bottom: 10px;
        }

        .promo-banner {
            background: white; border: 2px dashed #ffeeba; color: #d35400;
            padding: 15px; border-radius: 15px; text-align: center;
            font-size: 15px; margin-bottom: 25px; font-weight: bold;
        }

        .product-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px;
        }

        .product-card {
            background: white; border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); display: flex; flex-direction: column;
        }

        .product-img-container { height: 150px; background-color: #fce4ec; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }

        .product-info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; gap: 12px; }
        .product-header { display: flex; justify-content: space-between; align-items: center; }
        .product-title { font-weight: 700; font-size: 20px; margin: 0; color: #d35400; font-family: 'Caveat', cursive; }
        .product-price { font-size: 18px; font-weight: bold; color: var(--primary); background: #fff0f0; padding: 5px 10px; border-radius: 10px; }

        .label-small { font-size: 12px; color: #888; font-weight: 600; margin-left: 2px; }
        select {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #eee;
            background-color: #f9f9f9; font-size: 14px; color: #555; font-family: 'Quicksand', sans-serif;
        }

        .btn-add-card {
            background: #d35400; color: white; border: none; padding: 12px;
            border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 15px;
            margin-top: 5px; box-shadow: 0 4px 6px rgba(211, 84, 0, 0.2);
        }

        .cart-float-btn {
            position: fixed; bottom: 20px; right: 20px;
            background-color: var(--success); color: white;
            padding: 12px 25px; border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex; align-items: center; gap: 10px;
            cursor: pointer; z-index: 1000; font-weight: bold; font-size: 16px; border: none;
            font-family: 'Quicksand', sans-serif; transition: transform 0.3s;
        }
        .cart-float-btn.hidden { transform: scale(0); pointer-events: none; }
        .badge-count {
            background: white; color: var(--success); border-radius: 50%;
            width: 24px; height: 24px; display: flex; align-items: center;
            justify-content: center; font-size: 12px; font-weight: 900;
        }

        /* MODAL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 2000; display: none;
            justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(5px);
        }
        .modal-overlay.active { display: flex; }

        .modal-box {
            background: white; width: 100%; max-width: 450px;
            border-radius: 25px; padding: 25px; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-height: 90vh;
            display: flex; flex-direction: column; overflow-y: auto;
        }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .modal-header h2 { margin: 0; font-size: 24px; color: var(--text); font-family: 'Caveat', cursive; }
        .btn-close { background: none; border: none; font-size: 28px; color: #999; cursor: pointer; }
        .btn-empty { background: none; border: 1px solid #ffcccc; color: #e63946; border-radius: 8px; padding: 5px 10px; font-size: 12px; cursor: pointer; }

        .modal-body { flex-grow: 1; overflow-y: auto; }
        .cart-item-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed #eee; font-size: 15px; }
        
        .price-container {
            text-align: right; display: flex; flex-direction: column; align-items: flex-end;
        }
        .price-old {
            text-decoration: line-through; color: #999; font-size: 16px; margin-bottom: 2px; display: none; 
        }
        .checkout-total { font-size: 26px; font-weight: 800; color: var(--success); display: block; }
